{% extends "base.html" %}
{% block title %}Admin Dashboard — Asian Supermarket George{% endblock %}

{% block content %}
<div class="admin-wrap">
  <div class="admin-header">
    <div>
      <div class="section-label" style="margin-bottom:0.5rem">Restaurant admin</div>
      <h2 class="section-title" style="margin:0">Booking <em>Dashboard</em></h2>
    </div>
    <div class="admin-header-right">
      <span class="pending-badge" id="pending-badge">0 pending</span>
      <button class="btn btn-outline btn-sm" onclick="loadDemo()">Load demo</button>
      <button class="btn btn-outline btn-sm" onclick="clearAll()">Clear all</button>
    </div>
  </div>

  <div class="stats-grid" id="stats-grid">
    <div class="stat-card"><div class="stat-label">Total bookings</div><div class="stat-val" id="stat-total">—</div></div>
    <div class="stat-card"><div class="stat-label">Pending review</div><div class="stat-val orange" id="stat-pending">—</div></div>
    <div class="stat-card"><div class="stat-label">Confirmed</div><div class="stat-val green" id="stat-confirmed">—</div></div>
    <div class="stat-card"><div class="stat-label">Total guests</div><div class="stat-val" id="stat-guests">—</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" data-filter="pending" onclick="setFilter('pending',this)">Pending</button>
    <button class="filter-btn success" data-filter="confirmed" onclick="setFilter('confirmed',this)">Confirmed</button>
    <button class="filter-btn danger" data-filter="cancelled" onclick="setFilter('cancelled',this)">Cancelled</button>
    <input class="search-input" type="text" id="search" placeholder="Search name or email..." oninput="renderBookings()" />
  </div>

  <div class="bookings-list" id="bookings-list"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/admin.js"></script>
{% endblock %}
