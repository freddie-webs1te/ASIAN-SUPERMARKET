{% extends "base.html" %}
{% block title %}Book a Table — Asian Supermarket George{% endblock %}

{% block content %}
<div class="page-wrap">
  <div class="chat-wrapper">
    <div class="chat-header">
      <div class="chat-avatar">🍣</div>
      <div class="chat-header-info">
        <strong>Asian Supermarket George</strong>
        <span><span class="status-dot"></span>After-hours booking</span>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="quick-replies" id="quick-replies"></div>
    <div class="input-area">
      <input type="text" id="user-input" placeholder="Type your reply..." autocomplete="off" />
      <button class="send-btn" id="send-btn">
        <svg viewBox="0 0 24 24" fill="white" width="18" height="18"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/book.js"></script>
{% endblock %}
